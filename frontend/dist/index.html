<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Benchmark CT</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.navbar { display: flex; align-items: center; gap: 24px; padding: 12px 24px; background: #161b22; border-bottom: 1px solid #30363d; }
.navbar .logo { font-size: 18px; font-weight: 700; color: #58a6ff; white-space: nowrap; }
.navbar .nav-links { display: flex; gap: 4px; flex: 1; }
.navbar .nav-links button { background: none; border: none; color: #8b949e; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.15s, color 0.15s; }
.navbar .nav-links button:hover { background: #21262d; color: #c9d1d9; }
.navbar .nav-links button.active { background: #388bfd26; color: #58a6ff; font-weight: 600; }
.navbar .api-status { margin-left: auto; font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
.navbar .api-status .dot { width: 8px; height: 8px; border-radius: 50%; }
.navbar .api-status .dot.connected { background: #3fb950; }
.navbar .api-status .dot.disconnected { background: #f85149; }

.main { flex: 1; padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; }

/* ── Cards ── */
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 15px; color: #8b949e; margin-bottom: 8px; font-weight: 500; }
.card .value { font-size: 28px; font-weight: 700; color: #f0f6fc; }
.card .unit { font-size: 13px; color: #8b949e; }

/* ── Metric Grid ── */
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

/* ── Forms ── */
label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; font-weight: 500; }
input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
  color: #c9d1d9; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus { border-color: #388bfd; }
textarea { resize: vertical; min-height: 100px; }
.form-group { margin-bottom: 16px; }

/* ── Buttons ── */
.btn { padding: 8px 20px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.15s, border-color 0.15s; }
.btn:hover { background: #30363d; }
.btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da363322; border-color: #da3633; color: #f85149; }
.btn-danger:hover { background: #da363344; }
.btn-sm { padding: 4px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #30363d; color: #8b949e; font-weight: 600; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #161b22; }

/* ── Pre / Code ── */
pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.6; max-height: 400px; white-space: pre-wrap; word-break: break-word; }

/* ── Chart ── */
.chart-bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 180px; padding: 0 4px; border-bottom: 1px solid #30363d; }
.chart-bar { flex: 1; background: #388bfd; min-width: 12px; border-radius: 3px 3px 0 0; position: relative; transition: height 0.3s; }
.chart-bar:hover { background: #58a6ff; }
.chart-bar-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #8b949e; white-space: nowrap; }
.chart-bar-value { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #c9d1d9; }

/* ── Misc ── */
.page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: #f0f6fc; }
.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-green { background: #3fb95022; color: #3fb950; }
.badge-blue { background: #58a6ff22; color: #58a6ff; }
.badge-yellow { background: #d2992222; color: #d29922; }
.empty-state { text-align: center; padding: 48px 24px; color: #8b949e; }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 1000; animation: slideIn 0.2s ease; }
.toast-success { background: #238636; color: #fff; }
.toast-error { background: #da3633; color: #fff; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.hidden { display: none !important; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #f0f6fc; }
.filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.filter-bar .form-group { margin-bottom: 0; min-width: 160px; }
</style>
</head>
<body>
<div class="app">
  <nav class="navbar">
    <div class="logo">LLM Benchmark CT</div>
    <div class="nav-links">
      <button data-page="dashboard" class="active">Dashboard</button>
      <button data-page="endpoints">Endpoints</button>
      <button data-page="runner">Runner</button>
      <button data-page="history">History</button>
      <button data-page="comparison">Compare</button>
    </div>
    <div class="api-status">
      <span class="dot disconnected" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>
  </nav>
  <main class="main" id="app"></main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
