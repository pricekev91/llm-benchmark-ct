services:
  llm-benchmark-ct:
    container_name: llm-benchmark-ct
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Persistent storage for database
      - /opt/ct/llm-benchmark/db:/opt/ct/llm-benchmark/db
      # Persistent storage for endpoint configurations
      - /opt/ct/llm-benchmark/configs:/opt/ct/llm-benchmark/configs
    environment:
      # Placeholder for API Key used in authentication
      - API_KEY=${API_KEY}
    restart: unless-stopped
    networks:
      macvlan:
        ipv4_address: 192.168.1.4

networks:
  macvlan:
    external: true
