services:
  llm-benchmark-ct:
    container_name: llm-benchmark-ct
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /opt/ct/llm-benchmark/db:/app/db
      - /opt/ct/llm-benchmark/configs:/app/config
      - /home/pricekev/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    restart: unless-stopped
    networks:
      macvlan:
        ipv4_address: 192.168.1.4

networks:
  macvlan:
    external: true
